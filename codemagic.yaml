workflows:
  ios_appstore:
    name: iOS App Store
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - parachoot
      vars:
        APP_BUNDLE_ID: com.parachoot.soccer
        IOS_SCHEME: App
        IOS_WORKSPACE: ios/App/App.xcworkspace
        IOS_CONFIGURATION: Release
        TEAM_ID: 3YAP8Q5QWD
        PROFILE_NAME: ios provison
      node: 22
    scripts:
      - name: Install dependencies
        script: npm ci --no-audit --no-fund
      - name: Build web app
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Set up signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
          # Import certificate & provisioning profile from repository if available
          P12_PATH="$CM_BUILD_DIR/certificates.p12"
          P12_PASSWORD="${P12_PASSWORD:-123456}"
          if [ -f "$P12_PATH" ]; then
            echo "Importing distribution certificate from repository..."
            security import "$P12_PATH" -k "$HOME/Library/Keychains/login.keychain-db" -P "$P12_PASSWORD" -T /usr/bin/codesign || true
            security set-key-partition-list -S apple-tool:,apple: -s -k "" "$HOME/Library/Keychains/login.keychain-db" || true
          else
            echo "No certificates.p12 found in repo; relying on Codemagic keychain assets"
          fi
          PROFILE_FILE="$CM_BUILD_DIR/Parachoot_App_Store.mobileprovision"
          if [ -f "$PROFILE_FILE" ]; then
            echo "Installing Parachoot_App_Store.mobileprovision from repository..."
            mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
            TMP_PLIST="/tmp/parachoot_profile.plist"
            security cms -D -i "$PROFILE_FILE" > "$TMP_PLIST"
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$TMP_PLIST" 2>/dev/null || echo "")
            PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$TMP_PLIST" 2>/dev/null || echo "")
            if [ -n "$PROFILE_UUID" ]; then
              cp "$PROFILE_FILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
            else
              cp "$PROFILE_FILE" "$HOME/Library/MobileDevice/Provisioning Profiles/"
            fi
            [ -n "$PROFILE_UUID" ] && echo "PROFILE_UUID=$PROFILE_UUID" >> "$CM_ENV"
            [ -n "$PROFILE_NAME" ] && echo "PROFILE_NAME=$PROFILE_NAME" >> "$CM_ENV"
            echo "Installed provisioning profile: UUID=$PROFILE_UUID NAME=$PROFILE_NAME"
          else
            echo "No Parachoot_App_Store.mobileprovision found in repo; relying on Codemagic profiles"
          fi
          # Ensure any uploaded profile is installed; then auto-detect the correct profile by bundle id & team id
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "Searching installed provisioning profiles for bundle id ${APP_BUNDLE_ID} and team ${TEAM_ID}..."
          for f in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            [ -e "$f" ] || continue
            plist="/tmp/profile.plist"
            security cms -D -i "$f" > "$plist" 2>/dev/null || continue
            BID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$plist" 2>/dev/null || echo "")
            UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$plist" 2>/dev/null || echo "")
            # application-identifier is TEAMID.BUNDLEID; match both parts
            case "$BID" in
              ${TEAM_ID}.${APP_BUNDLE_ID})
                PROFILE_UUID="$UUID"
                echo "Matched provisioning profile UUID: $PROFILE_UUID ($f)"
                break
                ;;
            esac
          done
          if [ -n "${PROFILE_UUID:-}" ]; then
            echo "PROFILE_UUID=$PROFILE_UUID" >> "$CM_ENV"
          else
            echo "No matching profile UUID found; will try profile name fallback: $PROFILE_NAME"
          fi
      - name: Build IPA
        script: |
          set -e
          ARCHIVE_PATH="$PWD/build/App.xcarchive"
          EXPORT_PATH="$PWD/build/export"
          echo "Archiving without code signing; signing will occur at export step"
          xcodebuild -workspace "$IOS_WORKSPACE" -scheme "$IOS_SCHEME" -configuration "$IOS_CONFIGURATION" -destination "generic/platform=iOS" -archivePath "$ARCHIVE_PATH" archive DEVELOPMENT_TEAM="$TEAM_ID" CODE_SIGNING_ALLOWED=NO COMPILER_INDEX_STORE_ENABLE=NO
          mkdir -p "$EXPORT_PATH"
          cat > exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportPath "$EXPORT_PATH" -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
