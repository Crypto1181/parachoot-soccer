workflows:
  ios_appstore:
    name: iOS App Store
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        APP_BUNDLE_ID: com.parachoot.soccer
        IOS_SCHEME: App
        IOS_WORKSPACE: ios/App/App.xcworkspace
        IOS_CONFIGURATION: Release
        TEAM_ID: 3YAP8Q5QWD
        PROFILE_NAME: ios provison
      node: 22
    scripts:
      - name: Install dependencies
        script: npm ci --no-audit --no-fund
      - name: Build web app
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Set up signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
          if [ -n "${CM_PROVISIONING_PROFILE:-}" ]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp "$CM_PROVISIONING_PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/ || true
            PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$CM_PROVISIONING_PROFILE" 2>/dev/null || echo "")
            echo "Detected provisioning profile UUID: $PROFILE_UUID"
            echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV_PATH
          fi
      - name: Build IPA
        script: |
          set -e
          ARCHIVE_PATH="$PWD/build/App.xcarchive"
          EXPORT_PATH="$PWD/build/export"
          PROFILE_SPEC="${PROFILE_UUID:-$PROFILE_NAME}"
          echo "Using provisioning profile specifier: $PROFILE_SPEC"
          xcodebuild -workspace "$IOS_WORKSPACE" -scheme "$IOS_SCHEME" -configuration "$IOS_CONFIGURATION" -destination "generic/platform=iOS" -archivePath "$ARCHIVE_PATH" archive DEVELOPMENT_TEAM="$TEAM_ID" CODE_SIGN_STYLE=Manual PROVISIONING_PROFILE_SPECIFIER="$PROFILE_SPEC" COMPILER_INDEX_STORE_ENABLE=NO
          mkdir -p "$EXPORT_PATH"
          cat > exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportPath "$EXPORT_PATH" -exportOptionsPlist exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
