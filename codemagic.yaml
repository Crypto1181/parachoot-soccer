workflows:
  ios_appstore:
    name: iOS App Store
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        APP_BUNDLE_ID: com.parachoot.soccer
        IOS_SCHEME: App
        IOS_WORKSPACE: ios/App/App.xcworkspace
        IOS_CONFIGURATION: Release
      node: 22
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm ci --no-audit --no-fund
      - name: Build web app
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install pods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Set up signing
        script: |
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$IOS_WORKSPACE" \
            --scheme "$IOS_SCHEME" \
            --configuration "$IOS_CONFIGURATION"
    artifacts:
      - build/ios/ipa/*.ipa
