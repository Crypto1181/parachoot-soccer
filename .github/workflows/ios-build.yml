name: ios-build
on:
  workflow_dispatch:
    inputs:
      export_method:
        type: choice
        required: true
        default: app-store
        options:
          - app-store
          - ad-hoc
          - development
jobs:
  build:
    runs-on: macos-latest
    env:
      NODE_ENV: production
      BUNDLE_ID: com.parachoot.soccer
      TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
      P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: npm exec cap sync ios
      - run: sudo gem install cocoapods -N
      - run: pod repo update
        working-directory: ios/App
      - run: echo "$IOS_P12_BASE64" | base64 --decode > ios_cert.p12
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
      - run: echo "$IOS_MOBILEPROVISION_BASE64" | base64 --decode > profile.mobileprovision
        env:
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      - run: |
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import ios_cert.p12 -k ~/Library/Keychains/build.keychain -P "$P12_PASSWORD" -A
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
      - run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -destination "generic/platform=iOS" -archivePath $PWD/build/App.xcarchive DEVELOPMENT_TEAM="$TEAM_ID" PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" CODE_SIGN_STYLE=Manual
      - run: |
          cat > exportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export_method }}</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive -exportPath $PWD/build/export -exportOptionsPlist exportOptions.plist
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/export/*.ipa
